AWSTemplateFormatVersion: '2010-09-09'
Description: A template to create IAM resources for a static website.

Parameters:
  ApplicationName:
    Type: String
    Default: 'serverless-api'

Resources:

  APILambdaInvocatinRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Join [ '-', [ !Ref ApplicationName, 'api']]
      Description: 'An IAM role to allow lambda invocation'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lambda-invocation-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'
        - PolicyName: dynamodb-access-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/optimistic-locking*'
Outputs:
  APILambdaInvocatinRoleArn:
    Value: !GetAtt APILambdaInvocatinRole.Arn
    Export:
      Name: !Join [ '-', [ !Ref ApplicationName, 'lambda']]
    Description: 'API Lambda Invocation role Amazone Resource Name'